name: agent_code_client
description: >
  Cross-platform client library for Agent Code.
  Provides JSON-RPC over WebSocket communication with agent-code serve instances.
  Models, protocol types, and WebSocket client are platform-independent.
  AgentManager and ConfigService require dart:io (native platforms only).
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  equatable: ^2.0.0
  web_socket_channel: ^3.0.0
  http: ^1.2.0
  uuid: ^4.0.0

dev_dependencies:
  test: ^1.24.0
  mocktail: ^1.0.0
